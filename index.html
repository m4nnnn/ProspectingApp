<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/index.css">
    <title>prospectingapp</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
    
    

 <header>
      <img class="HeaderImg" src="./public/vite.svg" alt="placeholder">
    </header>
<div class="LogFull">
    <div class="LogDiv">
      <h2 class="Log-h2">Créer votre compte</h2>

      <h3 class="Log-h3">Nom d'utilisateur</h3>
      <input class="Log-input" id="Create-name" type="text">
    
      <h3 class="Log-h3">Adresse Email </h3>
      <input class="Log-input" id="Create-mail" type="text">

      <h3 class="Log-h3">Mots de passe</h3>
      <input class="Log-input" id="Create-mdp" type="text">

      <h3 class="Log-h3">Confirmer mots de passe</h3>
      <input class="Log-input" id="Create-check-mdp" type="text">

      <button id="Log-return" class="Create">Créer le compte</button>

      <p id="Log-link" >Vous disposez déjà d'un compte ?</p>
      <button class="Log-btn" id="Log-return">annuler</button>
    </div>

    <div class="LogDiv">
      <h2 class="Log-h2">Connexion</h2>

      <h3 class="NewAccount-h3">Nom d'utilisateur</h3>
      <input class="Log-input" id="Login-name" type="text">

      <h3 class="Log-h3">Mots de passe</h3>
      <input class="Log-input" id="Login-mdp" type="text">
      <button id="Log-return" class="Connect">se connecter</button>
       <p id="Log-link">Mots de passe oublié ?</p>
       <button class="Log-btn" id="Log-return">annuler</button>
    </div>

    <div class="LogDiv">
       <h2 class="Log-h2">Déconnexion</h2>
       <button class="deconnect" id="Log-return">Se déconnecter</button>
       <button class="Log-btn" id="Log-return">annuler</button>
    </div>
</div>
    <footer>
    </footer>

  </body>
</html>
